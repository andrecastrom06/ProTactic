<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulário de Empresário</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1 th:text="${empresario.cpf != null} ? 'Editar Empresário' : 'Novo Empresário'"></h1>

    <form th:action="@{/empresario/salvar}" method="post">
        <!-- Campos da Pessoa -->
        <label>CPF:</label>
        <input type="text" th:field="${pessoa.cpf}" required /><br/>

        <label>Nome:</label>
        <input type="text" th:field="${pessoa.nome}" required /><br/>

        <label>RG:</label>
        <input type="text" th:field="${pessoa.rg}" required /><br/>

        <label>Cidade:</label>
        <input type="text" th:field="${pessoa.cidade}" required /><br/>

        <label>Estado:</label>
        <input type="text" th:field="${pessoa.estado}" required /><br/>

        <label>País:</label>
        <input type="text" th:field="${pessoa.pais}" required /><br/>

        <label>Data de Nascimento:</label>
        <input type="date" th:field="${pessoa.dataNascimento}" required /><br/>

        <!-- Campos do Empresário -->
        <label>Agência:</label>
        <input type="text" th:field="${empresario.agencia}" required /><br/>

        <label>Registro FIFA:</label>
        <input type="text" th:field="${empresario.registroFifa}" required /><br/>

        <button type="submit">Salvar</button>
    </form>

    <a th:href="@{/empresario}">Voltar</a>
</body>
</html>
